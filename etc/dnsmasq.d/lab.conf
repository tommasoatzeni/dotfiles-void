###############################################################################
# DNSMASQ CONFIGURATION - Mobile Lab Router (MINIMAL VERSION)
###############################################################################
# System: ThinkPad X230 "mucchina" (Manjaro Linux)
# Purpose: Portable NAT router with DHCP for lab/field deployments
# Author: Tommy (IW5DPW)
# Network: 192.168.1.0/24
# Gateway: 192.168.1.1 (this machine)
# WAN: 4G modem via enp0s20f0u1
###############################################################################

# Listen ONLY on LAN interface
interface=eno1
bind-interfaces

# DHCP pool: 192.168.1.50-150, 12h lease
dhcp-range=192.168.1.50,192.168.1.150,12h

# Gateway for DHCP clients
dhcp-option=3,192.168.1.1

# DNS servers (Cloudflare, Google)
dhcp-option=6,1.1.1.1,8.8.8.8

# Static lease: pandora (NUC hypervisor)
dhcp-host=ea:9b:28:73:26:8c,pandora,192.168.1.10,infinite

#Static lease: pataccone (X230 Operation Center)
dhcp-host=3c:97:0e:64:35:4c,pataccone,192.168.1.20,infinite

# Logging
log-dhcp

# End of configuration

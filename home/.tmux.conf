# ~/.tmux.conf - pataccone (configurazione zen)

# Cambia il prefix da Ctrl+b a Ctrl+a (più comodo, come screen)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Ricarica config con prefix + r
bind r source-file ~/.tmux.conf \; display "Config ricaricata!"

# Splitta i pannelli con tasti intuitivi
# prefix + | per split verticale
# prefix + - per split orizzontale
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Naviga tra pannelli con Alt+frecce (senza prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Naviga tra finestre con Shift+frecce
bind -n S-Left  previous-window
bind -n S-Right next-window

# Statusbar minimale in basso
set -g status-position bottom
set -g status-style 'bg=colour234 fg=colour137'
set -g status-left '[#S] '
set -g status-right '#H | %d/%m %H:%M'
set -g status-right-length 50
set -g status-left-length 20

# Finestra attiva evidenziata
setw -g window-status-current-style 'fg=colour1 bold'

# Numerazione finestre da 1
set -g base-index 1
setw -g pane-base-index 1

# Scroll con mouse abilitato
set -g mouse on

# Nessun delay su Escape (utile con vim)
set -sg escape-time 0

# Aumenta scrollback buffer
set -g history-limit 50000

# Colori
set -g default-terminal "screen-256color"
